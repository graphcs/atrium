services:
  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@10.18.2 --activate && pnpm install && pnpm dev"
    ports:
      - "3001:3001"
      - "5173:5173"
    volumes:
      - ..:/app
      - node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001

volumes:
  node-modules:
